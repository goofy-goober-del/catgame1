<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cat Presser</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle, #001100, #000000);
      font-family: 'Courier New', monospace;
      color: #00ff00;
    }

    #start-screen {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 20, 0, 0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      z-index: 10;
    }

    #title {
      font-size: 60px;
      font-weight: bold;
      color: #00ff00;
      text-shadow: 0 0 20px #00ff00;
      margin-bottom: 40px;
    }

    #play-btn {
      padding: 20px 40px;
      font-size: 30px;
      background: black;
      border: 3px solid #00ff00;
      color: #00ff00;
      cursor: pointer;
      text-shadow: 0 0 10px #00ff00;
    }

    #play-btn:hover {
      background: #003300;
    }

    #score {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 30px;
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00;
      z-index: 5;
    }

    #settings-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 10px 20px;
      font-size: 18px;
      background: black;
      border: 2px solid #00ff00;
      color: #00ff00;
      cursor: pointer;
      z-index: 5;
    }

    #settings-btn:hover {
      background: #003300;
    }

    #settings-menu {
      position: absolute;
      top: 60px;
      right: 10px;
      width: 260px;
      background: rgba(0, 20, 0, 0.95);
      border: 2px solid #00ff00;
      padding: 10px;
      display: none;
      color: #00ff00;
      font-size: 14px;
      z-index: 6;
    }

    .settings-btn {
      display: block;
      width: 100%;
      margin: 3px 0;
      padding: 5px;
      background: black;
      border: 1px solid #00ff00;
      color: #00ff00;
      cursor: pointer;
      text-align: left;
      font-size: 13px;
    }

    .settings-btn:hover {
      background: #003300;
    }

    #game-over {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 20, 0, 0.95);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00;
      z-index: 20;
    }

    #game-over h1 {
      font-size: 50px;
      margin-bottom: 20px;
    }

    #restart-btn {
      margin-top: 30px;
      padding: 20px 40px;
      font-size: 30px;
      background: black;
      border: 3px solid #00ff00;
      color: #00ff00;
      cursor: pointer;
    }

    #restart-btn:hover {
      background: #003300;
    }

    .cat {
      position: absolute;
      font-size: 40px;
      user-select: none;
      text-shadow: 0 0 10px #ffffff;
    }

    .boost, .shrink {
      position: absolute;
      font-size: 30px;
      font-weight: bold;
      user-select: none;
      text-shadow: 0 0 10px #ffffff;
    }

    #bowl {
      position: absolute;
      bottom: 20px;
      width: 80px;
      height: 30px;
      background: #00ff00;
      border-radius: 50%;
      box-shadow: 0 0 20px #00ff00;
    }
  </style>
</head>

<body>
  <div id="start-screen">
    <div id="title">CAT PRESSER</div>
    <button id="play-btn">PLAY</button>
  </div>

  <div id="score">Score: 0</div>

  <button id="settings-btn">SETTINGS</button>

  <div id="settings-menu">
    <h3>Background Themes</h3>
    <button class="settings-btn" data-bg="green">Cyber Green</button>
    <button class="settings-btn" data-bg="blue">Cyber Blue</button>
    <button class="settings-btn" data-bg="purple">Cyber Purple</button>
    <button class="settings-btn" data-bg="red">Danger Red</button>
    <button class="settings-btn" data-bg="matrix">Matrix</button>
    <button class="settings-btn" data-bg="rainbow">Rainbow</button>

    <h3>Multiplayer (coming soon)</h3>
    <button class="settings-btn" id="local-mp-btn">Local Multiplayer</button>
    <button class="settings-btn" id="online-mp-btn">Online Multiplayer</button>
  </div>

  <div id="game-over">
    <h1>GAME OVER</h1>
    <h2 id="final-score"></h2>
    <h2 id="high-score"></h2>
    <button id="restart-btn">RESTART</button>
  </div>

  <div id="bowl"></div>

  <script>

  </script>

</body>
</html>
