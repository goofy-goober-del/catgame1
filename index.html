<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cat Presser</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle, #001100, #000000);
    font-family: 'Courier New', monospace;
    color: #00ff00;
  }

  #start-screen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0, 20, 0, 0.9);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  #title {
    font-size: 60px;
    font-weight: bold;
    color: #00ff00;
    text-shadow: 0 0 20px #00ff00;
    margin-bottom: 40px;
  }

  #play-btn {
    padding: 20px 40px;
    font-size: 30px;
    background: black;
    border: 3px solid #00ff00;
    color: #00ff00;
    cursor: pointer;
    text-shadow: 0 0 10px #00ff00;
  }

  #play-btn:hover {
    background: #003300;
  }

  #score {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 30px;
    color: #00ff00;
    text-shadow: 0 0 10px #00ff00;
  }

  #game-over {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0, 20, 0, 0.95);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #00ff00;
    text-shadow: 0 0 10px #00ff00;
  }

  #game-over h1 {
    font-size: 50px;
  }

  #restart-btn {
    margin-top: 30px;
    padding: 20px 40px;
    font-size: 30px;
    background: black;
    border: 3px solid #00ff00;
    color: #00ff00;
    cursor: pointer;
  }

  #restart-btn:hover {
    background: #003300;
  }

  .cat {
    position: absolute;
    font-size: 40px;
    cursor: pointer;
    user-select: none;
  }
</style>
</head>

<body>

<div id="start-screen">
  <div id="title">CAT PRESSER</div>
  <button id="play-btn">PLAY</button>
</div>

<div id="score">Score: 0</div>

<div id="game-over">
  <h1>GAME OVER</h1>
  <h2 id="final-score"></h2>
  <h2 id="high-score"></h2>
  <button id="restart-btn">RESTART</button>
</div>

<script>
let score = 0;
let highScore = localStorage.getItem("catHighScore") || 0;
let gameRunning = false;

function spawnCat() {
  if (!gameRunning) return;

  const cat = document.createElement("div");
  cat.className = "cat";
  cat.textContent = "🐱";

  cat.style.left = Math.random() * (window.innerWidth - 50) + "px";
  cat.style.top = "-50px";

  document.body.appendChild(cat);

  let fallSpeed = 2 + Math.random() * 3;

  function fall() {
    if (!gameRunning) return;

    let y = parseFloat(cat.style.top);
    y += fallSpeed;
    cat.style.top = y + "px";

    if (y > window.innerHeight - 50) {
      endGame();
      cat.remove();
      return;
    }

    requestAnimationFrame(fall);
  }

  cat.onclick = () => {
    score++;
    document.getElementById("score").textContent = "Score: " + score;
    cat.remove();
  };

  fall();
}

function startGame() {
  score = 0;
  gameRunning = true;
  document.getElementById("score").textContent = "Score: 0";
  document.getElementById("start-screen").style.display = "none";
  document.getElementById("game-over").style.display = "none";

  setInterval(spawnCat, 700);
}

function endGame() {
  gameRunning = false;

  if (score > highScore) {
    highScore = score;
    localStorage.setItem("catHighScore", highScore);
  }

  document.getElementById("final-score").textContent = "Your Score: " + score;
  document.getElementById("high-score").textContent = "High Score: " + highScore;
  document.getElementById("game-over").style.display = "flex";
}

document.getElementById("play-btn").onclick = startGame;
document.getElementById("restart-btn").onclick = () => {
  document.getElementById("start-screen").style.display = "flex";
  document.getElementById("game-over").style.display = "none";
};
</script>

</body>
</html>
